<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauna Tracker - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">
    <h1 class="page-title">Dashboard</h1>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <!-- Populated by dashboard.js -->
    </div>

    <!-- Weekly Chart -->
    <div class="chart-section">
      <div class="chart-title">Last 7 Days (minutes)</div>
      <div class="chart-container">
        <canvas id="weeklyChart"></canvas>
      </div>
    </div>

    <!-- Monthly Trend -->
    <div class="chart-section">
      <div class="chart-title">Monthly Trend (total minutes)</div>
      <div class="chart-container">
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>

    <!-- Biometrics Data -->
    <div class="chart-section">
      <h2 class="section-heading">Biometrics Data</h2>

      <div class="chart-section">
        <div class="chart-title">Weight Trend</div>
        <div class="chart-container chart-container--tall">
          <canvas id="weightChart"></canvas>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-title">Body Fat % Trend</div>
        <div class="chart-container chart-container--tall">
          <canvas id="bodyFatChart"></canvas>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-title">Skeletal Muscle Mass Trend</div>
        <div class="chart-container chart-container--tall">
          <canvas id="muscleChart"></canvas>
        </div>
      </div>

      <!-- Biometrics Stats Card -->
      <div class="bio-stats-card" id="bioStatsCard">
        <div class="bio-stats-title">Sauna &amp; Biometrics Correlation</div>
        <div id="bioStatsContent">
          Loading biometrics data…
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">⏱</span>
      <span>Timer</span>
    </a>
    <a href="log.html" class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Log</span>
    </a>
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span>Dashboard</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
