<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauna Tracker - Timer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <!-- Page Header -->
    <h1 class="page-title">Sauna Timer</h1>

    <!-- Timer Display -->
    <div class="timer-display">
      <div class="timer-time" id="timerDisplay">00:00</div>
      <div class="timer-status" id="timerStatus">Ready</div>
    </div>

    <!-- Timer Controls -->
    <div class="timer-controls">
      <button class="btn-timer btn-start" id="btnStart" title="Start timer (Space)">▶</button>
      <button class="btn-timer btn-stop" id="btnStop" title="Stop timer (Space)">■</button>
      <button class="btn-timer btn-reset" id="btnReset" title="Reset timer">↺</button>
    </div>

    <!-- Today's Sessions -->
    <div class="today-session">
      <div class="section-title">Today's Sessions</div>
      <div id="todaySessions">
        <div class="session-empty">No sessions logged today yet</div>
      </div>
    </div>
  </div>

  <!-- Session Log Modal -->
  <div class="modal-overlay" id="sessionModal">
    <div class="modal">
      <div class="modal-title">Log Session</div>
      <div class="modal-subtitle" id="modalSubtitle">Session: 00:00</div>

      <div class="form-group">
        <label class="form-label" for="tempSelect">Temperature</label>
        <select class="form-select" id="tempSelect" required>
          <option value="" disabled selected>Select temperature...</option>
          <option value="60-70°C">60–70°C</option>
          <option value="70-80°C">70–80°C</option>
          <option value="80-90°C">80–90°C</option>
          <option value="90-100°C">90–100°C</option>
          <option value="steam">Steam</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="notesTextarea">Notes (optional)</label>
        <textarea class="form-textarea" id="notesTextarea" placeholder="How was it? Any thoughts..." rows="3"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancel">Cancel</button>
        <button class="btn btn-primary" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">⏱</span>
      <span>Timer</span>
    </a>
    <a href="log.html" class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Log</span>
    </a>
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>Dashboard</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/log.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
